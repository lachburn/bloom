<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE4EC"/>
    </radialGradient>
    <radialGradient id="petal" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFCCD8"/>
      <stop offset="100%" stop-color="#F9A8C0"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Petals -->
  <g transform="translate(256,256)">
    <!-- 8 petals -->
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(0) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(45) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(90) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(135) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(180) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(225) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(270) translate(0,-90)"/>
    <ellipse rx="52" ry="100" fill="url(#petal)" opacity="0.9" transform="rotate(315) translate(0,-90)"/>

    <!-- Center -->
    <circle r="52" fill="url(#center)"/>
    <circle r="36" fill="#FCD34D" opacity="0.6"/>
    <circle r="20" fill="#FBBF24"/>
  </g>
</svg>
